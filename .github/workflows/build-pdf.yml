name: Build and Commit PDF

on:
  push:
    branches: [ "main" ]
    paths:
      - "**.py"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # necessario per push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install reportlab matplotlib

      - name: Run script (generate PDF)
        run: |
          python genera_pdf_pompaggio_tripoli_sahara_v2.py

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Commit and push PDF if changed
        run: |
          git add *.pdf || true

          if git diff --cached --quiet; then
            echo "Nessuna modifica nei PDF"
          else
            git commit -m "Auto-generated PDF [skip ci]"
            git push
          fi

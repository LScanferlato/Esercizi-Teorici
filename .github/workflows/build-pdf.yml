name: Build PDF from Python script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # permette run manuale da GitHub

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install reportlab matplotlib

      - name: Run script (generate PDF)
        run: |
          python genera_pdf_pompaggio_tripoli_sahara_v2.py

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-output
          path: "*.pdf"

      - name: Upload charts (debug utile)
        uses: actions/upload-artifact@v4
        with:
          name: charts
          path: "*.png"
